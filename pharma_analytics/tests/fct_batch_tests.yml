version: 2

models:
  - name: fct_batch
    columns:
      - name: batch_key
        tests:
          - unique
          - not_null

      - name: batch_id
        tests:
          - unique
          - not_null

      - name: product_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_product')
              field: product_key

      - name: date_id
        tests:
          - relationships:
              to: ref('dim_date')
              field: date_id

      - name: batch_yield
        tests:
          - not_null

      - name: dissolution_average
        tests:
          - not_null

      - name: total_impurities
        tests:
          - not_null

      - name: batch_size
        tests:
          - not_null

      - name: quality_status
        tests:
          - not_null
          - accepted_values:
              values: ['PASS', 'FAIL']
