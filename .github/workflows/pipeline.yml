name: Pharma Analytics Pipeline

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install ODBC Driver 18
      run: |
        sudo apt-get update
        sudo apt-get install -y odbc-postgresql unixodbc-dev
        curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
        curl https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
        sudo apt-get update
        sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r ingestion/requirements.txt
        pip install dbt-sqlserver
    
    - name: Load data to Azure SQL
      env:
        AZURE_SQL_SERVER: ${{ secrets.AZURE_SQL_SERVER }}
        AZURE_SQL_DB: ${{ secrets.AZURE_SQL_DB }}
        AZURE_SQL_USER: ${{ secrets.AZURE_SQL_USER }}
        AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
      run: |
        python ingestion/load_to_azure_sql.py
    
    - name: Run dbt
      env:
        AZURE_SQL_SERVER: ${{ secrets.AZURE_SQL_SERVER }}
        AZURE_SQL_DB: ${{ secrets.AZURE_SQL_DB }}
        AZURE_SQL_USER: ${{ secrets.AZURE_SQL_USER }}
        AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
      run: |
        cd pharma_analytics
        dbt deps
        dbt run
        dbt test
    
    - name: Notify on success
      if: success()
      run: echo "Pipeline completed successfully!"
    
    - name: Notify on failure
      if: failure()
      run: echo "Pipeline failed! Check logs."